# PageDrop production stack: PostgreSQL + FastAPI backend + Caddy (static web,
# React renderer, and API reverse proxy).
#
# Usage:
#   cp .env.example .env   # then edit secrets
#   docker compose up -d --build
#
# All commands run from the infra/ directory.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pagedrop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-pagedrop}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pagedrop} -d ${POSTGRES_DB:-pagedrop}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://pagedrop:${POSTGRES_PASSWORD}@postgres:5432/pagedrop}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      TOKEN_PEPPER: ${TOKEN_PEPPER:?set TOKEN_PEPPER in .env}
      APP_BASE_URL: ${APP_BASE_URL:-https://pagedrop.justinhuang.top}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://pagedrop.justinhuang.top}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      DEBUG: ${DEBUG:-false}
      SMTP_HOST: ${SMTP_HOST:-smtp.qq.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_AUTH_CODE: ${SMTP_AUTH_CODE:-}
      SMTP_FROM: ${SMTP_FROM:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      ASSETS_DIR: ${ASSETS_DIR:-/data/assets}
      ASSET_MAX_BYTES: ${ASSET_MAX_BYTES:-10485760}
      # Outbound proxy for OAuth token/identity calls (github.com, googleapis.com).
      # This host reaches those providers via a proxy; the container needs it too,
      # or OAuth code exchange times out. Leave blank if the host has direct egress.
      HTTP_PROXY: ${OAUTH_HTTP_PROXY:-}
      HTTPS_PROXY: ${OAUTH_HTTP_PROXY:-}
      NO_PROXY: ${OAUTH_NO_PROXY:-postgres,localhost,127.0.0.1}
    expose:
      - "8000"
    volumes:
      - asset_data:/data/assets

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      # Behind Cloudflare Tunnel: publish plain HTTP to localhost only; the
      # tunnel forwards the public hostname here and terminates HTTPS at the edge.
      - "127.0.0.1:8090:80"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pg_data:
  caddy_data:
  caddy_config:
  asset_data:
